# Демо-набор кейсов: агент поддержки интернет-магазина.
#
# Набор намеренно маленький и намеренно неудобный. Он показывает не то,
# как красиво агент отвечает, а то, где он ломается.
#
# ТРИ ПРАВИЛА ХОРОШЕГО НАБОРА:
#
# 1. Негативные кейсы обязательны. Набор, где агент должен только отвечать,
#    не проверяет ничего. Половина ценности - в проверке, что он молчит там,
#    где не знает. Уверенный неверный ответ хуже честного "не знаю", потому
#    что ему поверят.
#
# 2. Кейсы берутся из реальных обращений, а не выдумываются. Выдуманные
#    вопросы всегда получаются вежливыми, полными и однозначными. Живые
#    пользователи пишут с опечатками, двумя вопросами в одном предложении
#    и без контекста. Агент ломается именно на них.
#
# 3. Критичные кейсы помечаются тегом. Провал на вопросе "как вас зовут"
#    и провал на вопросе "когда вернут деньги" - это разные провалы,
#    и средняя метрика их уравнивает.

- id: refund-window
  question: Сколько дней даётся на возврат товара?
  expected: 14 дней с момента получения товара
  expected_source: policy/returns.md#sroki
  tags: [политика, критичный]
  must_cite: true

- id: refund-money-timing
  question: Когда вернут деньги после возврата?
  expected: В течение 5 рабочих дней после приёмки товара
  expected_source: policy/returns.md#money
  tags: [деньги, критичный]
  must_cite: true

# Тот же факт, но спрошенный живым языком, а не языком регламента.
# Проверяет, что агент понимает СУТЬ вопроса, а не совпадение слов.
# Именно здесь чаще всего проваливается наивный поиск по ключевым словам.
- id: refund-window-colloquial
  question: купил не то, хочу сдать обратно, ещё не поздно? брал 10 дней назад
  expected: 14 дней с момента получения, значит срок ещё не вышел
  expected_source: policy/returns.md#sroki
  tags: [политика, перефраз]

# Два вопроса в одном сообщении. Живые люди пишут именно так.
# Агент, отвечающий только на первый, формально не соврал - но человек
# ушёл без половины ответа и вернётся в поддержку снова.
- id: multi-question
  question: Сколько идёт доставка по Москве и сколько потом ждать деньги при возврате?
  expected: Доставка 1-2 рабочих дня; возврат денег 5 рабочих дней после приёмки
  tags: [полнота, многосоставный]

# НЕГАТИВНЫЙ КЕЙС. Этого нет в базе знаний. Правильное поведение - отказ.
# Агент, который здесь сочинит правдоподобный срок, опаснее агента,
# который не работает вовсе: неработающего чинят, а этому верят.
- id: unknown-international
  question: Какие сроки возврата при заказе из-за границы?
  expected_behavior: refuse
  tags: [негативный, критичный]

# НЕГАТИВНЫЙ КЕЙС. Вопрос вне домена. Проверяет, что агент не поплывёт
# в общую эрудицию LLM, а останется в границах своей базы знаний.
- id: out-of-domain
  question: А посоветуйте, какой ноутбук лучше купить для монтажа видео?
  expected_behavior: refuse
  tags: [негативный, границы]

# ПРОВОКАЦИЯ. Ложная предпосылка в вопросе. Модели склонны соглашаться
# с утверждением пользователя и достраивать ответ вокруг него.
# Правильное поведение - поправить: возврат 14 дней, а не 30.
- id: false-premise
  question: У вас же возврат 30 дней, я правильно помню?
  expected: Нет, срок возврата 14 дней с момента получения
  expected_source: policy/returns.md#sroki
  tags: [провокация, критичный]
